<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Now | Bava Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fef9e6; }
        :root { --primary: #0B6E4F; --secondary: #D4AF37; --dark: #1a1a1a; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; padding: 1rem 5%; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .logo span { color: var(--secondary); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: color 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .order-btn { background: var(--primary); color: white; padding: 0.6rem 1.5rem; border-radius: 40px; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; margin-left: 0.5rem; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: var(--secondary); color: var(--primary); font-size: 0.65rem; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .order-container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }
        .order-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.08); transition: all 0.3s; }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .order-image { width: 100%; height: 180px; object-fit: cover; }
        .order-info { padding: 1.5rem; }
        .order-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .order-price { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .quantity-selector { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .quantity-btn { width: 35px; height: 35px; background: var(--gray); border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; }
        .quantity-btn:hover { background: var(--secondary); color: white; }
        .add-order-btn { width: 100%; background: var(--secondary); color: var(--primary); border: none; padding: 0.8rem; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .add-order-btn:hover { background: #b8921a; transform: scale(1.02); }
        .cart-sidebar { position: fixed; top: 0; right: -380px; width: 380px; height: 100vh; background: white; box-shadow: -5px 0 30px rgba(0,0,0,0.1); z-index: 1001; transition: right 0.3s; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-item { display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid #eee; }
        .cart-item-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-quantity { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
        .cart-item-quantity button { width: 25px; height: 25px; background: #f5f5f5; border: none; border-radius: 50%; cursor: pointer; }
        .cart-item-remove { color: #dc2626; cursor: pointer; background: none; border: none; }
        .cart-footer { padding: 1.5rem; border-top: 1px solid #eee; }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
        .checkout-btn { background: var(--primary); color: white; width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .cart-overlay.active { display: block; }
        .delivery-bike { position: fixed; bottom: 30px; right: -200px; background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; z-index: 1002; transition: right 0.5s; }
        .delivery-bike.active { right: 20px; }
        @media (max-width: 968px) { .nav-links { display: none; position: absolute; top: 70px; left: 0; width: 100%; background: white; flex-direction: column; padding: 2rem; } .nav-links.active { display: flex; } .menu-toggle { display: block; } .cart-sidebar { width: 100%; right: -100%; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">BAVA <span>RESTAURANT</span></div>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">HOME</a>
                <a href="menu.html">MENU</a>
                <a href="locations.html">LOCATIONS</a>
                <a href="blog.html">BLOG</a>
                <a href="offers.html">OFFERS</a>
                <a href="order.html" class="order-btn active"><i class="fas fa-motorcycle"></i> ORDER NOW</a>
                <div class="cart-icon" id="cartIcon"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></div>
            </div>
        </div>
    </nav>

    <div class="order-container">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold font-['Playfair_Display']">Place Your <span class="text-[#0B6E4F]">Order</span></h1>
            <p class="text-gray-500 mt-2">Select your favorite dishes and we'll deliver to your doorstep!</p>
        </div>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="orderGrid"></div>
    </div>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h3><i class="fas fa-shopping-bag mr-2"></i> Your Order</h3><button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button></div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer"><div class="cart-total"><span>Total:</span><span id="cartTotal">KES 0</span></div><button class="checkout-btn" id="checkoutBtn"><i class="fas fa-credit-card mr-2"></i> Place Order</button></div>
    </div>
    <div class="delivery-bike" id="deliveryBike"><i class="fas fa-motorcycle"></i><span>Added to order!</span></div>

    <script>
        const menuItems = [
            { id:1, name:"Nyama Choma", price:850, image:"https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=300&fit=crop", desc:"Grilled meat with kachumbari" },
            { id:2, name:"Grilled Chicken", price:650, image:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop", desc:"Spicy grilled chicken" },
            { id:3, name:"Beef Kebab", price:550, image:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&h=300&fit=crop", desc:"Spiced beef skewers" },
            { id:4, name:"Ugali & Sukuma", price:350, image:"https://images.unsplash.com/photo-1569058242253-92a9c755a0ec?w=400&h=300&fit=crop", desc:"Traditional cornmeal with greens" },
            { id:5, name:"Kenyan Pilau", price:450, image:"https://images.unsplash.com/photo-1551326844-4df70f78d0e9?w=400&h=300&fit=crop", desc:"Spiced rice with beef" },
            { id:6, name:"Githeri", price:300, image:"https://images.unsplash.com/photo-1565299507177-b0ac66763828?w=400&h=300&fit=crop", desc:"Corn and bean stew" },
            { id:7, name:"Fresh Mango Juice", price:150, image:"https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=400&h=300&fit=crop", desc:"100% pure mango juice" },
            { id:8, name:"Dawa Tea", price:100, image:"https://images.unsplash.com/photo-1594631252845-29fc4cc8cde9?w=400&h=300&fit=crop", desc:"Kenyan spiced tea" },
            { id:9, name:"Mandazi", price:50, image:"https://images.unsplash.com/photo-1589118949245-7d38baf380d6?w=400&h=300&fit=crop", desc:"Kenyan doughnuts" },
            { id:10, name:"Mahamri", price:80, image:"https://images.unsplash.com/photo-1623428454614-baf816f0b9f7?w=400&h=300&fit=crop", desc:"Coconut doughnuts" }
        ];
        let cart = JSON.parse(localStorage.getItem('bavaCart') || '[]');
        function updateCart() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); document.getElementById('cartTotal').innerText = `KES ${cart.reduce((s,i)=>s+i.price*i.quantity,0)}`; let html=''; if(cart.length===0) html='<p style="text-align:center;">Your cart is empty</p>'; else html=cart.map(i=>`<div class="cart-item"><img src="${i.image}" class="cart-item-img"><div class="cart-item-info"><div class="cart-item-name">${i.name}</div><div class="cart-item-price">KES ${i.price}</div><div class="cart-item-quantity"><button onclick="updateQ(${i.id},${i.quantity-1})">-</button><span>${i.quantity}</span><button onclick="updateQ(${i.id},${i.quantity+1})">+</button></div></div><button class="cart-item-remove" onclick="removeFromCart(${i.id})"><i class="fas fa-trash"></i></button></div>`).join(''); document.getElementById('cartItems').innerHTML=html; }
        function updateQ(id,q){ if(q<=0) removeFromCart(id); else{ let i=cart.find(x=>x.id===id); if(i) i.quantity=q; localStorage.setItem('bavaCart',JSON.stringify(cart)); updateCart(); } }
        function removeFromCart(id){ cart=cart.filter(i=>i.id!==id); localStorage.setItem('bavaCart',JSON.stringify(cart)); updateCart(); if(cart.length===0) closeCart(); }
        function showDelivery(){ document.getElementById('deliveryBike').classList.add('active'); setTimeout(()=>document.getElementById('deliveryBike').classList.remove('active'),1500); }
        function addToCart(id){ let item=menuItems.find(i=>i.id===id), existing=cart.find(i=>i.id===id); if(existing) existing.quantity++; else cart.push({...item,quantity:1}); localStorage.setItem('bavaCart',JSON.stringify(cart)); updateCart(); showDelivery(); openCart(); }
        function openCart(){ document.getElementById('cartSidebar').classList.add('open'); document.getElementById('cartOverlay').classList.add('active'); }
        function closeCart(){ document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('active'); }
        document.getElementById('orderGrid').innerHTML = menuItems.map(i=>`<div class="order-card"><img src="${i.image}" class="order-image"><div class="order-info"><h3 class="order-title">${i.name}</h3><p class="text-gray-500 text-sm">${i.desc}</p><div class="order-price">KES ${i.price}</div><div class="quantity-selector"><button class="quantity-btn" onclick="decreaseQty(${i.id})">-</button><span id="qty-${i.id}">0</span><button class="quantity-btn" onclick="increaseQty(${i.id})">+</button></div><button class="add-order-btn" onclick="addToCartOrder(${i.id})"><i class="fas fa-plus"></i> Add to Order</button></div></div>`).join('');
        let quantities = {};
        function increaseQty(id){ quantities[id] = (quantities[id]||0)+1; document.getElementById(`qty-${id}`).innerText = quantities[id]; }
        function decreaseQty(id){ if(quantities[id]>0) quantities[id]--; document.getElementById(`qty-${id}`).innerText = quantities[id]||0; }
        function addToCartOrder(id){ let qty = quantities[id]||0; if(qty===0){ alert('Please select quantity first!'); return; } let item=menuItems.find(i=>i.id===id), existing=cart.find(i=>i.id===id); if(existing) existing.quantity += qty; else cart.push({...item,quantity:qty}); localStorage.setItem('bavaCart',JSON.stringify(cart)); updateCart(); showDelivery(); openCart(); quantities[id]=0; document.getElementById(`qty-${id}`).innerText=0; }
        updateCart(); document.getElementById('cartIcon').addEventListener('click',openCart); document.getElementById('closeCart').addEventListener('click',closeCart); document.getElementById('cartOverlay').addEventListener('click',closeCart); document.getElementById('checkoutBtn').addEventListener('click',()=>alert('Order placed successfully! Total: KES '+cart.reduce((s,i)=>s+i.price*i.quantity,0)+'\nYour food will be delivered in 30 minutes!'));
        document.getElementById('menuToggle').addEventListener('click',()=>document.getElementById('navLinks').classList.toggle('active'));
        window.addToCart = addToCart; window.addToCartOrder = addToCartOrder; window.updateQ = updateQ; window.removeFromCart = removeFromCart;
    </script>
</body>
</html>
